name: 🤖 Telegram Bot 24/7
on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'  # Каждые 30 мин
concurrency:
  group: bot-deploy
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-22.04  # ✅ Быстрее!
    timeout-minutes: 120
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
      with: version: 9
    - uses: actions/setup-node@v4
      with:
        node-version: 24  # Новые runners
        cache: 'pnpm'
    - run: pnpm install --frozen-lockfile
    - name: 🚀 Bot LIVE!
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        YANDEX_API_KEY: ${{ secrets.YANDEX_API_KEY }}
        YANDEX_FOLDER_ID: ${{ secrets.YANDEX_FOLDER_ID }}
      run: |
        npx tsx artifacts/api-server/src/app.ts
